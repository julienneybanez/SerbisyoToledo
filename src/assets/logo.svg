<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main blue gradient -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9FF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a8fd5;stop-opacity:1" />
    </linearGradient>
    <!-- Accent teal gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44c9a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3ab88e;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2a7cc7" flood-opacity="0.3"/>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer circle - main badge -->
  <circle cx="256" cy="256" r="240" fill="url(#mainGrad)" filter="url(#shadow)"/>
  
  <!-- Inner ring for depth -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  
  <!-- Inner circle background -->
  <circle cx="256" cy="256" r="195" fill="rgba(255,255,255,0.08)"/>

  <!-- Wrench icon - left -->
  <g transform="translate(256, 245) rotate(-45)" opacity="0.95">
    <!-- Wrench handle -->
    <rect x="-12" y="-80" width="24" height="100" rx="12" fill="white"/>
    <!-- Wrench head -->
    <path d="M-30,-80 Q-30,-115 0,-115 Q30,-115 30,-80 L20,-80 Q20,-100 0,-100 Q-20,-100 -20,-80 Z" fill="white"/>
  </g>

  <!-- Gear icon - right -->
  <g transform="translate(290, 210)" opacity="0.95">
    <circle cx="0" cy="0" r="32" fill="none" stroke="white" stroke-width="12"/>
    <circle cx="0" cy="0" r="14" fill="url(#mainGrad)"/>
    <!-- Gear teeth -->
    <rect x="-6" y="-44" width="12" height="16" rx="3" fill="white"/>
    <rect x="-6" y="28" width="12" height="16" rx="3" fill="white"/>
    <rect x="-44" y="-6" width="16" height="12" rx="3" fill="white"/>
    <rect x="28" y="-6" width="16" height="12" rx="3" fill="white"/>
    <!-- Diagonal teeth -->
    <rect x="-6" y="-44" width="12" height="16" rx="3" fill="white" transform="rotate(45)"/>
    <rect x="-6" y="28" width="12" height="16" rx="3" fill="white" transform="rotate(45)"/>
    <rect x="-44" y="-6" width="16" height="12" rx="3" fill="white" transform="rotate(45)"/>
    <rect x="28" y="-6" width="16" height="12" rx="3" fill="white" transform="rotate(45)"/>
  </g>

  <!-- Location pin accent -->
  <g transform="translate(340, 320)">
    <path d="M0,-35 C-20,-35 -30,-18 -30,0 C-30,22 0,50 0,50 C0,50 30,22 30,0 C30,-18 20,-35 0,-35 Z" 
          fill="url(#accentGrad)" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="-2" r="11" fill="white"/>
  </g>

  <!-- "ST" monogram text -->
  <text x="190" y="360" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="120" fill="white" letter-spacing="-4">
    ST
  </text>

  <!-- Bottom accent line -->
  <line x1="160" y1="380" x2="350" y2="380" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round"/>
</svg>
